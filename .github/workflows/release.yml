name: Release

# Builds and publishes a GitHub Release on every push to master. The release is created only when
# modinfo.json's version has no matching tag yet, so merges that don't bump the version are no-ops.
on:
  push:
    branches: [ master ]

permissions:
  contents: write

env:
  # VS build to compile against (provides the API DLLs). Must be a .NET 10 build. Update on VS bumps.
  VS_VERSION: "1.22.0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Fetch Vintage Story assemblies
        run: |
          mkdir -p "$HOME/vs"
          curl -fsSL "https://cdn.vintagestory.at/gamefiles/stable/vs_server_linux-x64_${VS_VERSION}.tar.gz" -o vs.tar.gz
          tar -xzf vs.tar.gz -C "$HOME/vs"
          echo "VINTAGE_STORY=$HOME/vs" >> "$GITHUB_ENV"

      - name: Read mod metadata
        id: mod
        run: |
          echo "version=$(jq -r .version ImmersiveBackpacks/modinfo.json)" >> "$GITHUB_OUTPUT"
          echo "modid=$(jq -r .modid ImmersiveBackpacks/modinfo.json)" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.mod.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        if: steps.exists.outputs.skip == 'false'
        run: |
          bash build.sh
          bash build.sh --target=ModDescription

      - name: Create release
        if: steps.exists.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.mod.outputs.version }}" \
            Releases/*.zip \
            "mod-description.moddb.html" \
            --title "v${{ steps.mod.outputs.version }}" \
            --generate-notes
